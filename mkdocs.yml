# Project information
site_name: Toaiot WIKI
site_url: http://wiki.toaiot.cc
site_author: Toaiot Team
site_description: >-
  Toaiot BMCU product documentation 

# Repository
repo_name: Toaiot Products
repo_url: https://github.com/toaiot
edit_uri: "edit/main/docs"

# Copyright
copyright: Copyright &copy; 2014 - 2024 Toaiot Co, Ltd

# Configuration
theme:
  locale: en
  name: material
  #custom_dir: material/.overrides

  # 404 page
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

  # Default values, taken from mkdocs_theme.yml
  language: en
  features: 
    #- tabs
    - instant
    - header.autohide
    - navigation.top
    - navigation.path
    - navigation.sections
    # - navigation.expand
    #- content.tabs.link
    - content.code.copy
    #- toc.integrate
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.tooltips
    #- navigation.expand
    #- navigation.footer
    #- navigation.instant
    #- navigation.prune
    #- navigation.sections
    #- navigation.tabs
    #- navigation.tabs.sticky
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    #- toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
         icon: material/brightness-7
         name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
         icon: material/brightness-4
         name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
  logo: assets/logo.png
  favicon: assets/favicon.ico

# Plugins
#      default_language: !ENV [DEFAULT_LANGUAGE, "en"]
#      default_language_only: !ENV [DEFAULT_LANGUAGE_ONLY, false]
plugins:
  - search
  - i18n:
      reconfigure_material: true
      fallback_to_default: true
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          build: true
          default: true
          site_name: Toaiot WIKI
        - locale: zh
          name: 简体中文
          build: true  
          site_name: Toaiot WIKI 中文文档
          nav_translations:
            What's BMCU: 什么是 BMCU
            For developers: 开发者指南
            BMCU in P series: P 系列中的 BMCU
            Before building: 构建前
            While building: 构建中
            After building: 构建后
            # ORDER Set A: 套餐 A
            # ORDER Set B: 套餐 B
            # ORDER Set C: 套餐 C
            # ORDER Set D: 套餐 D
            Start using BMCU: 开始使用 BMCU
            Troubleshooting/FAQ: 常见问题与故障排除
            Tutorial: 教程
            LED Status Guide: LED 状态指南
            BMCU Burning Tutorial(UART): BMCU 刷写教程(UART)
            Firmware List: 固件列表
            
  - minify:
      minify_html: true

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: 'https://github.com/toaiot'
    # - icon: fontawesome/brands/facebook
    #   link: 'https://www.facebook.com/groups/197476557529090/'
    # - icon: fontawesome/brands/google-plus
    #   link: 'https://plus.google.com/communities/102413556437521044568'
#  alternate:
#    - name: English
#      link: /en/ 
#      lang: en
#    - name: 简体中文
#      link: /cn/
#      lang: zh

# Extensions
markdown_extensions:
  - markdown.extensions.admonition
  - markdown.extensions.attr_list
  - markdown.extensions.codehilite:
      guess_lang: false
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - markdown.extensions.meta
  - markdown.extensions.toc:
      permalink: true
#      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed
 #     alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true

# Page tree
nav:
- What's BMCU: index.md
- For developers: for_developers.md
- BMCU Flash: BMCU_in_P_series.md
- BMCU Debug and Usage Guide: BMCU_guide.md
- Before building:
  - ORDER Set A: ORDER_Version_Set_A.md
  - ORDER Set B: ORDER_Version_Set_B.md
  - ORDER Set C: ORDER_Version_Set_C.md
  - ORDER Set D: ORDER_Version_Set_D.md
- While building:
  - ORDER Set A: ORDER_Build_Set_A.md
  - ORDER Set B: ORDER_Build_Set_B.md
  - ORDER Set C: ORDER_Build_Set_C.md
  - ORDER Set D: ORDER_Build_Set_D.md
# - After building:
#   - Start using BMCU: Start_using_BMCU.md
#   - Troubleshooting/FAQ: Troubleshooting_FAQ.md
- Tutorial:
  - LED Status Guide: LED_Status_Guide.md
  - BMCU Burning Tutorial(UART): BMCU_Burning_Tutorial(UART).md
  - Firmware List: Firmware_List.md

extra_css:
  # - 'stylesheets/extra.css'
  - 'stylesheets/section_title.css'


extra_javascript:
   - javascripts/mathjax.js
   - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
     # - 'javascripts/extra.js'
     # - 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML'
  
